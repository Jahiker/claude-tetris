name: Claude Issue Triage

on:
  issues:
    types: [opened, edited]

jobs:
  triage:
    # El evento `edited` solo se dispara al cambiar título/cuerpo del issue
    # (labels y comentarios no lo disparan); este guard evita re-ejecuciones
    # si un bot edita el issue.
    if: github.event.sender.type != 'Bot'
    runs-on: ubuntu-latest
    permissions:
      contents: read # leer el código para el diagnóstico
      issues: write # asignar labels y comentar
      id-token: write # requerido por la action para el OIDC exchange
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Issue Triage
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Eres el agente de triage de issues del repositorio ${{ github.repository }}
            (un Tetris clásico en JavaScript vanilla + HTML5 Canvas, sin dependencias:
            game.js, index.html, style.css).

            Analiza el issue #${{ github.event.issue.number }} siguiendo estos pasos:

            1. LEER EL ISSUE
               Ejecuta: gh issue view ${{ github.event.issue.number }} --json title,body,labels,comments

            2. GARANTIZAR LA TAXONOMÍA DE LABELS
               Ejecuta `gh label list` y crea con `gh label create <nombre> --color <hex> --description "<desc>"`
               ÚNICAMENTE las que falten de esta taxonomía fija:
               - Tipo: bug (d73a4a), enhancement (a2eeef), documentation (0075ca), question (d876e3)
               - Área: gameplay (0e8a16), ui (fbca04), performance (5319e7)
               - Prioridad: P1-critical (b60205), P2-medium (ff9f1c), P3-low (c2e0c6)

            3. CLASIFICAR Y APLICAR LABELS
               Aplica labels SOLO de esa taxonomía con:
               gh issue edit ${{ github.event.issue.number }} --add-label "<label1>,<label2>,..."
               Reglas: exactamente una label de tipo, exactamente una de prioridad,
               y las de área que apliquen (puede ser ninguna, una o varias).
               Si el issue ya tiene labels de la taxonomía que ya no aplican, quítalas con --remove-label.

            4. DIAGNÓSTICO TÉCNICO COMPLETO
               Lee el código relevante del repositorio (game.js, index.html, style.css) con Read/Grep.
               Localiza la causa raíz probable con referencias exactas archivo:línea y
               nombres de funciones/variables involucradas. Redacta un plan de fix paso a paso
               lo bastante concreto como para implementarlo directamente.

            5. PUBLICAR EL COMENTARIO DE TRIAGE
               Antes de comentar, revisa los comentarios existentes del issue: si ya hay un
               comentario de triage previo (empieza con "## 🤖 Triage automático"), indica al
               inicio del nuevo comentario que este análisis reemplaza al anterior.
               Publica con `gh issue comment ${{ github.event.issue.number }} --body "..."`
               usando EXACTAMENTE esta plantilla en español:

               ## 🤖 Triage automático

               ### 🏷️ Clasificación
               (labels aplicadas y justificación breve de cada una)

               ### 🔍 Diagnóstico
               (causa raíz con referencias archivo:línea al código del repo)

               ### 🛠️ Plan de fix sugerido
               (pasos concretos y ordenados para implementar la solución)

               ### 💡 Siguiente paso
               Comenta `@claude implementa el fix propuesto` en este issue para que Claude lo implemente.

            No modifiques ningún archivo del repositorio; tu única salida son las labels y el comentario.
          claude_args: |
            --allowedTools "Bash(gh label list:*),Bash(gh label create:*),Bash(gh issue view:*),Bash(gh issue edit:*),Bash(gh issue comment:*),Read,Grep,Glob"
